<!DOCTYPE html>
<html lang="fr">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Document</title>
 <link rel="stylesheet" href="style.css">
</head>
<body class="inscription-page">
 <div class="Contenaire">
 <div class="logo">
   <img src="logoservantdemesse.jpg" alt="logo des servant de messe">
 </div>
 <h1>Groupe des Servants de Messe</h1>
 <p class="Sous-titre">Paroisse Saint Bernard</p>
 <form action="" novalidate>
   <div class="form-row">
     <div class="form-group">
       <label for="nom">Nom</label>
       <input type="text" id="nom" placeholder="Ex: Koffi" required>
     </div>
     <div class="form-group">
       <label for="prenom">Prénom</label>
       <input type="text" id="prenom" placeholder="Ex: Jean" required>
     </div>
   </div>
   <div class="form-group">
     <label for="age">Âge</label>
     <input type="number" id="age" min="1" max="99" placeholder="Âge" required>
   </div>
   <div class="form-group">
     <label for="tel">Numéro de téléphone d'un parent</label>
     <input type="tel" id="tel" placeholder="+225 01 23 45 67 89" required>
   </div>
   <button type="submit">S'inscrire</button>
 </form>
 <p class="message" id="message">Merci pour votre inscription</p>
 </div>
 
 
</body>
</html>
