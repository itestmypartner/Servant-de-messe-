<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Formulaire d'inscription pour les Servants de Messe de la Paroisse Saint-Bernard d'Adiopodoumé.">
  <meta property="og:title" content="Inscription - Servants de Messe">
  <meta property="og:description" content="Rejoignez le groupe des Servants de Messe. Remplissez ce formulaire pour vous inscrire.">
  <title>Inscription - Groupe des Servants de Messe</title>
  <link rel="stylesheet" href="style.css">
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-XXXXXXXXXX');
  </script>
</head>
<body class="inscription-page">
  <div class="Contenaire">
    <a href="index.html" class="back-link">← Retour à l'accueil</a>

    <div class="logo">
      <img src="logoservantdemesse.jpg" alt="Logo des Servants de Messe" loading="lazy">
    </div>

    <h1>Groupe des Servants de Messe</h1>
    <p class="Sous-titre">Paroisse Saint Bernard</p>

    <form novalidate id="inscriptionForm">
      <div class="form-row">
        <div class="form-group">
          <label for="nom">Nom</label>
          <input type="text" id="nom" name="nom" inputmode="text" placeholder="Ex: Koffi" required aria-required="true" autocomplete="family-name" autofocus>
        </div>
        <div class="form-group">
          <label for="prenom">Prénom</label>
          <input type="text" id="prenom" name="prenom" inputmode="text" placeholder="Ex: Jean" required aria-required="true" autocomplete="given-name">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="age">Âge</label>
          <input type="number" id="age" name="age" inputmode="numeric" min="8" max="15" placeholder="8 à 15" required aria-required="true">
        </div>
        <div class="form-group">
          <label for="tel">Numéro de téléphone</label>
          <input type="tel" id="tel" name="tel" inputmode="tel" pattern="^\+225\s?\d{10}$" placeholder="+225 XXXXXXXXXX" required aria-required="true" autocomplete="tel">
        </div>
      </div>

      <button type="submit" class="submit-btn">
        <span class="btn-text">S'inscrire</span>
        <span class="btn-spinner" aria-hidden="true"></span>
      </button>
    </form>

    <div class="toast" id="toast" role="alert" aria-live="assertive"></div>
  </div>

  <script>
    // Stockage localStorage des inscriptions + Mask téléphone + Toast
    (function(){
      var form = document.getElementById('inscriptionForm');
      var telInput = document.getElementById('tel');
      var toast = document.getElementById('toast');
      var submitBtn = document.querySelector('.submit-btn');
      var INSCRIPTIONS_KEY = 'inscriptions';
      
      if(!form) return;

      // Mask téléphone: +225 XXXXXXXXXX
      telInput.addEventListener('input', function(){
        var val = this.value.replace(/\D/g, '');
        if(val.length === 0) {
          this.value = '';
          return;
        }
        this.value = formatPhoneDigits(val);
      });

      // Toast helper
      function showToast(message, type){
        toast.textContent = message;
        toast.className = 'toast show ' + type;
        setTimeout(function(){ toast.classList.remove('show'); }, 4000);
      }

      function formatPhoneDigits(digits){
        var normalizedDigits = digits;
        if(digits.slice(0, 3) !== '225'){
          normalizedDigits = '225' + digits;
        }
        normalizedDigits = normalizedDigits.slice(0, 13);
        if(normalizedDigits.length <= 3) return '+' + normalizedDigits;
        return '+' + normalizedDigits.slice(0, 3) + ' ' + normalizedDigits.slice(3);
      }

      function normalizePhone(rawValue){
        var digits = rawValue.replace(/\D/g, '');
        if(digits.length === 10){
          digits = '225' + digits;
        }
        if(digits.slice(0, 3) !== '225' || digits.length !== 13){
          return null;
        }
        return '+' + digits.slice(0, 3) + ' ' + digits.slice(3);
      }

      function isValidName(value){
        return /^[A-Za-zÀ-ÖØ-öø-ÿ' -]{2,40}$/.test(value);
      }

      function getInscriptions(){
        var raw = localStorage.getItem(INSCRIPTIONS_KEY);
        if(!raw){
          return [];
        }
        try {
          var parsed = JSON.parse(raw);
          return Array.isArray(parsed) ? parsed : [];
        } catch (error) {
          showToast('Les données locales sont corrompues. Réinitialisation.', 'error');
          localStorage.removeItem(INSCRIPTIONS_KEY);
          return [];
        }
      }

      // Form submission : sauvegarder en localStorage
      form.addEventListener('submit', function(e){
        e.preventDefault();
        
        var nom = document.getElementById('nom').value.trim();
        var prenom = document.getElementById('prenom').value.trim();
        var age = document.getElementById('age').value.trim();
        var tel = document.getElementById('tel').value.trim();
        
        if(!nom || !prenom || !age || !tel){
          showToast('Veuillez remplir tous les champs.', 'error');
          return;
        }

        if(!isValidName(nom) || !isValidName(prenom)){
          showToast('Nom/Prénom invalides (2 à 40 lettres).', 'error');
          return;
        }

        var ageNumber = Number(age);
        if(!Number.isInteger(ageNumber) || ageNumber < 8 || ageNumber > 15){
          showToast("L'âge doit être compris entre 8 et 15 ans.", 'error');
          return;
        }

        var normalizedPhone = normalizePhone(tel);
        if(!normalizedPhone){
          showToast('Numéro invalide. Format attendu: +225 suivi de 10 chiffres.', 'error');
          return;
        }

        var inscriptions = getInscriptions();
        var duplicate = inscriptions.some(function(item){
          return (
            String(item.nom || '').toLowerCase() === nom.toLowerCase() &&
            String(item.prenom || '').toLowerCase() === prenom.toLowerCase() &&
            String(item.tel || '') === normalizedPhone
          );
        });
        if(duplicate){
          showToast('Cette inscription existe déjà.', 'error');
          return;
        }

        // Créer objet inscription avec timestamp
        var inscription = {
          id: (window.crypto && window.crypto.randomUUID)
            ? window.crypto.randomUUID()
            : String(Date.now()) + '-' + String(Math.floor(Math.random() * 100000)),
          nom: nom,
          prenom: prenom,
          age: ageNumber,
          tel: normalizedPhone,
          date: new Date().toLocaleString('fr-FR'),
          createdAt: new Date().toISOString()
        };

        inscriptions.push(inscription);
        localStorage.setItem(INSCRIPTIONS_KEY, JSON.stringify(inscriptions));

        submitBtn.classList.add('loading');
        setTimeout(function(){
          showToast('✓ Inscription réussie !', 'success');
          form.reset();
          submitBtn.classList.remove('loading');
        }, 1500);

        // Track form interactions with GA
        if(typeof gtag !== 'undefined'){
          gtag('event', 'generate_lead', {value: 1});
        }
      });
    })();
  </script>

</body>
</html>
