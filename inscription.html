<!DOCTYPE html>
<html lang="fr">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Document</title>
 <link rel="stylesheet" href="style.css">
</head>
<body class="inscription-page">
 <div class="Contenaire">
 <div class="logo">
 <img src="logoservantdemesse.jpg" alt="logo des servant de messe">
 </div>
 <h1>Groupe des Servants de Messe</h1>
 <p class="Sous-titre">Paroisse Saint Bernard</p>
 <form action="">
 <label for="nom">Nom</label>
 <input type="text" id="nom" required>
 <label for="prenom">Prenom</label>
 <input type="text" id="prenom" required>
 <label for="age">Âge</label>
 <input type="number" id="age" min="1" max="99" required>
 <label for="tel"> Numéro de téléphone d'un parent</label>
 <input type="tel" id="tel" required>
 <button type="submit">S'inscrire</button>
 </form>
 <p class="message" id="message">Merci pour votre inscription</p>
 </div>

 <script>
 // Afficher message de confirmation sans recharger
 (function(){
   var form = document.querySelector('.Contenaire form');
   var message = document.getElementById('message');
   if(!form) return;
   form.addEventListener('submit', function(e){
     e.preventDefault();
     // validation minimale
     var nom = document.getElementById('nom').value.trim();
     var prenom = document.getElementById('prenom').value.trim();
     var age = document.getElementById('age').value.trim();
     var tel = document.getElementById('tel').value.trim();
     if(!nom || !prenom || !age || !tel){
       message.textContent = 'Veuillez remplir tous les champs.';
       message.style.color = '#c23b3b';
       message.classList.add('show');
       return;
     }
     // succès
     message.textContent = 'Merci pour votre inscription — nous vous contacterons bientôt.';
     message.style.color = '#0d8a3f';
     message.classList.add('show');
     form.reset();
   });
 })();
 </script>

</body>
</html>
