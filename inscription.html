<!DOCTYPE html>
<html lang="fr">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Document</title>
 <link rel="stylesheet" href="style.css">
</head>
<body class="inscription-page">
 <div class="Contenaire">
 <div class="logo">
   <picture>
     <source srcset="logoservantdemesse.webp" type="image/webp">
     <img src="logoservantdemesse.jpg" alt="logo des servant de messe" width="300" height="300" loading="lazy">
   </picture>
 </div>
 <h1>Groupe des Servants de Messe</h1>
 <p class="Sous-titre">Paroisse Saint Bernard</p>
 <form action="/api/inscriptions" method="post" novalidate>
   <div class="form-row">
     <div class="form-group">
       <label for="nom">Nom</label>
       <input type="text" id="nom" name="nom" inputmode="text" placeholder="Ex: Koffi" required aria-required="true" autofocus>
     </div>
     <div class="form-group">
       <label for="prenom">Prénom</label>
       <input type="text" id="prenom" name="prenom" inputmode="text" placeholder="Ex: Jean" required aria-required="true">
     </div>
   </div>

   <div class="form-row">
     <div class="form-group">
       <label for="age">Âge</label>
       <input type="number" id="age" name="age" inputmode="numeric" min="1" max="99" placeholder="Âge" required aria-required="true">
     </div>
     <div class="form-group">
       <label for="tel">Numéro de téléphone d'un parent</label>
       <input type="tel" id="tel" name="tel" inputmode="tel" pattern="\+?\d{8,15}" placeholder="+225 XXXXXXXXXX" required aria-required="true">
     </div>
   </div>

   <button type="submit" class="submit-btn">
     <span class="btn-text">S'inscrire</span>
     <span class="btn-spinner" aria-hidden="true"></span>
   </button>
 </form>

 <p class="message" id="message" role="status" aria-live="polite">Merci pour votre inscription</p>
 </div>

 <script>
 // Afficher message de confirmation sans recharger
 (function(){
   var form = document.querySelector('.Contenaire form');
   var message = document.getElementById('message');
   if(!form) return;
   form.addEventListener('submit', function(e){
     e.preventDefault();
     // validation minimale
     var nom = document.getElementById('nom').value.trim();
     var prenom = document.getElementById('prenom').value.trim();
     var age = document.getElementById('age').value.trim();
     var tel = document.getElementById('tel').value.trim();
     if(!nom || !prenom || !age || !tel){
       message.textContent = 'Veuillez remplir tous les champs.';
       message.style.color = '#c23b3b';
       message.classList.add('show');
       return;
     }
     // succès
     message.textContent = 'Merci pour votre inscription — nous vous contacterons bientôt.';
     message.style.color = '#0d8a3f';
     message.classList.add('show');
     form.reset();
   });
 })();
 </script>

</body>
</html>
