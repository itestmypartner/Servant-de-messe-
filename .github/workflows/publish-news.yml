name: Publish news to repository

on:
  workflow_dispatch:
    inputs:
      news_json:
        description: 'Contenu JSON complet pour data/news.json (string)'
        required: true
        default: ''

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Write data/news.json and commit
        env:
          NEWS_JSON: "${{ github.event.inputs.news_json }}"
        run: |
          mkdir -p data
          # Write the JSON safely
          echo "$NEWS_JSON" > data/news.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/news.json
          # Only commit if changes
          if ! git diff --staged --quiet; then
            git commit -m "Publish news via workflow_dispatch"
            git push origin HEAD:main
          else
            echo "No changes to publish"
          fi
        shell: bash
